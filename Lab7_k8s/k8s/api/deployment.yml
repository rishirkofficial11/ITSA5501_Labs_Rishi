apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: app-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: profjigisha/worker:latest   
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3000"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: api-db
              mountPath: /app/data
      volumes:
        - name: api-db
          persistentVolumeClaim:
            claimName: api-db-data
